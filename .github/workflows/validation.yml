name: Validacion del proyecto

on:
  push:
    branches:
      - develop
      - certification
      - main

  pull_request:
    branches:
      - develop
      - certification
      - main

jobs:
  validate-project:
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: MLOps-InsightLab

    steps:
      - name: Descargar repositorio
        uses: actions/checkout@v6

      - name: Configurar Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"

      - name: Instalar dependencias
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Verificar sintaxis de scripts Python
        run: |
          python -m compileall src

      - name: Verificar imports principales
        run: |
          python -c "import pandas, numpy, scipy"
          python -c "import sklearn"
          python -c "import matplotlib, seaborn"
          python -c "import xgboost"
          python -c "import catboost"
          python -c "import fastapi, uvicorn"
          python -c "import streamlit"

      - name: Ejecutar carga de datos
        run: |
          python src/cargar_datos.py

      - name: Ejecutar pipeline de feature engineering
        run: |
          python -c "from src.ft_engineering import ft_engineering; ft_engineering()"
